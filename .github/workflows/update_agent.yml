name: Auto Update World Cup Scenario

on:
  schedule:
    # 조별리그 3차전 기간(6월 25일~28일) 동안 매 5분마다 스크립트 실행
    # (종료 휘슬이 불려 API 데이터가 'TRUE'로 바뀌는 즉시 대시보드에 반영됨)
    - cron: '*/5 * 25-28 6 *'
    
  workflow_dispatch: # 테스트용 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub 저장소의 코드를 체크아웃합니다.
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경을 설정합니다.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 필요한 의존성 라이브러리를 설치합니다.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 파이썬 로직을 실행하여 무료 API에서 결과를 계산합니다. (API KEY 불필요)
    - name: Run Python Parser
      run: python agent.py

    # 5. 변경된 data/results.json 파일을 내 저장소에 자동으로 커밋하고 푸시합니다.
    - name: Commit and Push if updated
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 변경 사항이 있는지 확인 후 스테이징
        git add data/results.json
        
        # 변경된 내용이 있을 때만 커밋 및 푸시 진행 (빈 커밋 오류 방지)
        if ! git diff --cached --quiet; then
          git commit -m "🤖 봇: 최신 경기 결과 및 경우의 수 업데이트 (자동)"
          git push
        else
          echo "변경 사항이 없어 커밋을 건너뜁니다."
        fi
